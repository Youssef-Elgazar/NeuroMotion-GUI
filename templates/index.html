<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HanBack RobonovaAI Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
        }

        .status-bar {
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-message {
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: 500;
        }

        .status-success {
            background: #dcfce7;
            color: #166534;
        }

        .status-error {
            background: #fee2e2;
            color: #991b1b;
        }

        .control-panel {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .section-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 3px solid #667eea;
        }

        .command-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .command-btn {
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .command-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .command-btn:active {
            transform: translateY(-1px);
        }

        .command-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .category {
            margin-bottom: 30px;
        }

        .category-name {
            font-size: 1.2em;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .quick-actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .quick-btn {
            flex: 1;
            min-width: 150px;
            padding: 15px 30px;
            font-size: 1.1em;
            background: #10b981;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
        }

        .quick-btn:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.6);
        }

        .quick-btn.danger {
            background: #ef4444;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        .quick-btn.danger:hover {
            background: #dc2626;
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.6);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .command-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }

            .quick-actions {
                flex-direction: column;
            }

            .quick-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🤖 HanBack RobonovaAI Control</h1>
            <p class="subtitle">Web-Based Robot Motion Control Interface</p>
        </div>

        <div class="status-bar">
            <div class="status-indicator">
                <div class="status-dot"></div>
                <span>Connected</span>
            </div>
            <div id="status-message" class="status-message status-success">
                Ready to send commands
            </div>
        </div>

        <div class="control-panel">
            <h2 class="section-title">Quick Actions</h2>
            <div class="quick-actions">
                <button class="quick-btn" onclick="sendCommand('ATTENTION_1')">🎯 Attention</button>
                <button class="quick-btn" onclick="sendCommand('BOW')">🙇 Bow</button>
                <button class="quick-btn" onclick="sendCommand('CEREMONY')">🎉 Ceremony</button>
                <button class="quick-btn danger" onclick="sendCommand('SIT_DOWN')">💺 Sit Down</button>
            </div>

            <div class="category">
                <h3 class="category-name">🚶 Movement</h3>
                <div class="command-grid">
                    <button class="command-btn" onclick="sendCommand('FWD_SHORT_STEP')">Forward Step</button>
                    <button class="command-btn" onclick="sendCommand('BWD_SHORT_STEP')">Backward Step</button>
                    <button class="command-btn" onclick="sendCommand('FWD_RUN')">Forward Run</button>
                    <button class="command-btn" onclick="sendCommand('BWD_RUN')">Backward Run</button>
                    <button class="command-btn" onclick="sendCommand('LEFT_TURN')">Turn Left</button>
                    <button class="command-btn" onclick="sendCommand('RIGHT_TURN')">Turn Right</button>
                    <button class="command-btn" onclick="sendCommand('GO_LEFT')">Go Left</button>
                    <button class="command-btn" onclick="sendCommand('GO_RIGHT')">Go Right</button>
                    <button class="command-btn" onclick="sendCommand('MARK_TIME')">Mark Time</button>
                </div>
            </div>

            <div class="category">
                <h3 class="category-name">👊 Attack Moves</h3>
                <div class="command-grid">
                    <button class="command-btn" onclick="sendCommand('RIGHT_SHOOTING')">Right Shooting</button>
                    <button class="command-btn" onclick="sendCommand('LEFT_SHOOTING')">Left Shooting</button>
                    <button class="command-btn" onclick="sendCommand('LEFT_FRONT_SIDE_ATTACK')">Left Front Attack</button>
                    <button class="command-btn" onclick="sendCommand('RIGHT_FRONT_SIDE_ATTACK')">Right Front Attack</button>
                    <button class="command-btn" onclick="sendCommand('LEFT_SIDE_ATTACK')">Left Side Attack</button>
                    <button class="command-btn" onclick="sendCommand('RIGHT_SIDE_ATTACK')">Right Side Attack</button>
                    <button class="command-btn" onclick="sendCommand('LEFT_BACK_ATTACK')">Left Back Attack</button>
                    <button class="command-btn" onclick="sendCommand('RIGHT_BACK_ATTACK')">Right Back Attack</button>
                    <button class="command-btn" onclick="sendCommand('BACK_LIFT_ATTACK')">Back Lift Attack</button>
                    <button class="command-btn" onclick="sendCommand('FRONT_LIFT_ATTACK')">Front Lift Attack</button>
                    <button class="command-btn" onclick="sendCommand('FRONT_BOTH_SIDE_PUNCH')">Both Side Punch</button>
                </div>
            </div>

            <div class="category">
                <h3 class="category-name">🤸 Acrobatics</h3>
                <div class="command-grid">
                    <button class="command-btn" onclick="sendCommand('TUMBLING_FORWARD')">Tumbling Forward</button>
                    <button class="command-btn" onclick="sendCommand('TUMBLING_BACKWARD')">Tumbling Backward</button>
                    <button class="command-btn" onclick="sendCommand('FLAPPING_AND_STANDUP')">Flapping & Stand</button>
                </div>
            </div>

            <div class="category">
                <h3 class="category-name">🎭 Expressions</h3>
                <div class="command-grid">
                    <button class="command-btn" onclick="sendCommand('HEAD_LEFT')">Head Left</button>
                    <button class="command-btn" onclick="sendCommand('HEAD_RIGHT')">Head Right</button>
                    <button class="command-btn" onclick="sendCommand('LOSER1')">Loser 1</button>
                    <button class="command-btn" onclick="sendCommand('LOSER2')">Loser 2</button>
                    <button class="command-btn" onclick="sendCommand('MOTION_CAPTURE')">Motion Capture</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let commandInProgress = false;

        function updateStatus(message, type) {
            const statusEl = document.getElementById('status-message');
            statusEl.textContent = message;
            statusEl.className = 'status-message status-' + type;
        }

        function sendCommand(commandName) {
            if (commandInProgress) {
                updateStatus('Please wait, command in progress...', 'error');
                return;
            }

            commandInProgress = true;
            updateStatus('Sending command: ' + commandName + '...', 'success');

            fetch('/api/send_command', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ command: commandName })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    updateStatus(data.message, 'success');
                } else {
                    updateStatus(data.message, 'error');
                }
            })
            .catch(error => {
                updateStatus('Error: ' + error.message, 'error');
            })
            .finally(() => {
                setTimeout(() => {
                    commandInProgress = false;
                }, 300);
            });
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT') return;

            const keyMap = {
                'w': 'FWD_SHORT_STEP',
                's': 'BWD_SHORT_STEP',
                'a': 'LEFT_TURN',
                'd': 'RIGHT_TURN',
                'q': 'GO_LEFT',
                'e': 'GO_RIGHT',
                ' ': 'ATTENTION_1'
            };

            if (keyMap[e.key]) {
                e.preventDefault();
                sendCommand(keyMap[e.key]);
            }
        });

        // Check status on load
        window.addEventListener('load', function() {
            fetch('/api/status')
                .then(response => response.json())
                .then(data => {
                    if (data.serial_connected) {
                        updateStatus('Connected to robot on ' + data.serial_port, 'success');
                    } else {
                        updateStatus('Warning: Serial port not connected', 'error');
                    }
                })
                .catch(error => {
                    updateStatus('Error checking status', 'error');
                });
        });
    </script>
</body>
</html>
